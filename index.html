<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1e8fb5">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>出演予定</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans JP',sans-serif;background:#f0f8fc;color:#1a2e38;font-size:14px;
  padding-bottom:60px}

/* ===== ローディング ===== */
#loading{position:fixed;inset:0;background:#1e8fb5;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:999;gap:14px;transition:opacity .3s}
#loading.off{opacity:0;pointer-events:none}
.spin{width:36px;height:36px;border:3px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== セットアップ ===== */
#setup{display:none;max-width:400px;margin:60px auto;padding:16px}
.setup-box{background:#fff;border-radius:12px;padding:24px;
  box-shadow:0 4px 20px rgba(30,143,181,.15)}
.setup-title{font-size:1rem;font-weight:700;color:#1e8fb5;margin-bottom:10px}
.setup-note{font-size:.78rem;color:#4a6572;line-height:1.7;margin-bottom:14px}

/* ===== ボトムタブ ===== */
.bottom-tabs{position:fixed;bottom:0;left:0;right:0;background:#fff;
  border-top:2px solid #d0e8f0;display:flex;z-index:100;
  box-shadow:0 -2px 8px rgba(30,143,181,.10)}
.btab{flex:1;padding:8px 4px 6px;text-align:center;border:none;background:transparent;
  color:#9cc8dc;font-size:.68rem;font-family:'Noto Sans JP',sans-serif;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;
  transition:all .15s}
.btab svg{opacity:.5;transition:opacity .15s}
.btab.on{color:#1e8fb5}
.btab.on svg{opacity:1}
.btab-label{font-size:.65rem}

/* ===== タブコンテンツ ===== */
.tab-pane{display:none}
.tab-pane.on{display:block}

/* ===== 名前バー ===== */
.name-bar{background:#1e8fb5;padding:8px 12px;display:flex;align-items:center;gap:8px;
  position:sticky;top:0;z-index:50;box-shadow:0 2px 6px rgba(30,143,181,.25)}
.name-label{color:rgba(255,255,255,.85);font-size:.78rem;white-space:nowrap;font-weight:700}
.name-input{flex:1;border:none;border-radius:18px;padding:6px 14px;max-width:180px;
  font-size:.88rem;font-family:'Noto Sans JP',sans-serif;color:#1a2e38;outline:none}

/* 自分の回答管理ボタン */
.my-reply-bar{background:#e4f4fb;padding:7px 12px;display:flex;align-items:center;
  gap:8px;border-bottom:1px solid #b3dff0;flex-wrap:wrap}
.my-reply-info{font-size:.75rem;color:#1e6f8f;flex:1}
.btn-my-del{background:#fff;border:1px solid #d94f4f;color:#d94f4f;border-radius:14px;
  padding:4px 12px;font-size:.72rem;cursor:pointer;font-family:'Noto Sans JP',sans-serif;
  white-space:nowrap}
.btn-my-del:hover{background:#fce4e4}

/* ===== 出欠表 ===== */
.drag-hint{font-size:.68rem;color:#4a6572;padding:4px 12px;background:#fff;
  border-bottom:1px solid #d0e8f0;text-align:center}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{border-collapse:collapse;font-size:.82rem;min-width:100%}
th{background:#1e8fb5;color:#fff;padding:8px 5px;text-align:center;
  font-weight:700;white-space:nowrap;border:1px solid #167aa0}
th.th-date{text-align:left;padding-left:9px;min-width:90px;position:sticky;left:0;z-index:10}
th.th-cnt{min-width:30px;font-size:.72rem}
th.th-name{min-width:54px;max-width:70px;font-size:.73rem}
td{padding:7px 4px;border:1px solid #d0e8f0;text-align:center;background:#fff}
td.td-date{text-align:left;padding-left:8px;background:#f0f8fc;font-weight:700;
  white-space:nowrap;position:sticky;left:0;z-index:5;border-right:2px solid #b3dff0}
td.td-cnt{background:#e4f4fb;font-weight:700;font-size:.78rem}
.c-ok {background:#d4f5e4!important;color:#1a7a48;font-weight:700;font-size:1rem}
.c-ng {background:#fce4e4!important;color:#c03030;font-weight:700;font-size:1rem}
.c-dt {background:#fef5e0!important;color:#b07020;font-weight:700;font-size:1rem}
.c-mine{outline:2px solid #1e8fb5;outline-offset:-2px;cursor:pointer}
.c-tap {cursor:pointer}
tr.sum-row td{background:#dff0fb!important;font-weight:700}

/* 送信バー */
.send-bar{background:#fff;border-top:2px solid #d0e8f0;padding:10px 12px;
  display:flex;align-items:center;gap:10px}
.send-info{flex:1;font-size:.75rem;color:#4a6572;line-height:1.5}
.send-info strong{color:#1e8fb5}
.btn-send{background:#1e8fb5;color:#fff;border:none;border-radius:22px;
  padding:10px 24px;font-size:.88rem;font-weight:700;cursor:pointer;
  font-family:'Noto Sans JP',sans-serif;white-space:nowrap;flex-shrink:0;
  transition:background .15s}
.btn-send:hover{background:#167aa0}
.btn-send:disabled{background:#9cc8dc;cursor:default}

/* 予定を組むボタン */
.plan-bar{padding:12px;background:#fff;border-top:1px solid #d0e8f0}
.btn-plan{width:100%;padding:13px;background:linear-gradient(90deg,#1e8fb5,#2aadda);
  color:#fff;border:none;border-radius:8px;font-size:.95rem;font-weight:700;
  cursor:pointer;font-family:'Noto Sans JP',sans-serif;letter-spacing:.06em;
  box-shadow:0 3px 10px rgba(30,143,181,.3);transition:opacity .15s}
.btn-plan:hover{opacity:.88}

/* 番組モーダル */
#plan-modal{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;
  display:flex;align-items:flex-end;justify-content:center}
#plan-modal.hidden{display:none}
.plan-box{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:560px;
  max-height:85vh;overflow-y:auto;padding:20px 16px 32px}
.plan-box-head{display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #d0e8f0}
.plan-box-title{font-size:.95rem;font-weight:700;color:#1e8fb5}
.btn-close{background:none;border:none;font-size:1.3rem;color:#4a6572;cursor:pointer;
  padding:0 4px}
.plan-koen-sel{width:100%;margin-bottom:14px}

/* 番組リスト */
.cast-row{display:grid;grid-template-columns:26px 1fr 96px;gap:8px;
  align-items:center;padding:8px 0;border-bottom:1px solid #e4f4fb}
.cast-row:last-child{border:none}
.cast-num{width:24px;height:24px;border-radius:50%;background:#1e8fb5;color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700}
.cast-name{font-weight:700;font-size:.85rem}
.cast-role{font-size:.65rem;color:#4a6572;margin-top:1px}
.neta{border:1px dashed #c0dcea;border-radius:4px;padding:3px 7px;
  font-size:.75rem;background:#f0f8fc;width:100%;
  font-family:'Noto Sans JP',sans-serif}
.neta:focus{outline:none;border-color:#1e8fb5;background:#fff}
.nakairi-div{text-align:center;font-size:.72rem;color:#4a6572;
  padding:5px;background:#e4f4fb;border-radius:4px;margin:3px 0;letter-spacing:.1em}

/* ===== 管理タブ ===== */
.card{background:#fff;border:1px solid #d0e8f0;border-radius:8px;
  padding:14px;margin:12px;box-shadow:0 2px 6px rgba(30,143,181,.07)}
.card-head{font-size:.85rem;font-weight:700;color:#1e8fb5;margin-bottom:12px;
  padding-bottom:8px;border-bottom:1px solid #e4f4fb}
.f-label{display:block;font-size:.72rem;font-weight:700;color:#4a6572;margin-bottom:3px}
.f-input,.f-select{width:100%;padding:8px 10px;border:1px solid #c0dcea;
  border-radius:6px;font-size:.85rem;font-family:'Noto Sans JP',sans-serif;color:#1a2e38}
.f-input:focus,.f-select:focus{outline:none;border-color:#1e8fb5;
  box-shadow:0 0 0 2px rgba(30,143,181,.12)}
.f-row{display:flex;gap:8px;margin-bottom:10px;align-items:flex-end}
.f-group{flex:1;margin-bottom:10px}
.month-grid{display:flex;flex-wrap:wrap;gap:4px}
.mchk{display:inline-flex;align-items:center;gap:2px;padding:3px 8px;
  border-radius:12px;font-size:.72rem;border:1px solid #c0dcea;background:#fff;cursor:pointer}
.mchk input{accent-color:#1e8fb5}
.btn{padding:9px 16px;border-radius:6px;font-family:'Noto Sans JP',sans-serif;
  font-size:.82rem;font-weight:700;cursor:pointer;border:2px solid;transition:all .12s}
.btn-sky{background:#1e8fb5;border-color:#167aa0;color:#fff}
.btn-sky:hover{background:#167aa0}
.btn-outline{background:transparent;border-color:#c0dcea;color:#4a6572}
.btn-danger{background:transparent;border-color:#d94f4f;color:#d94f4f}
.btn-amber{background:#d4882a;border-color:#b07020;color:#fff}
.btn-full{width:100%;display:block;text-align:center;padding:11px}
.opt-label{font-size:.72rem;font-weight:700;color:#4a6572;margin-bottom:4px}
.opt-grp{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.opt-btn{padding:4px 12px;border-radius:12px;border:1.5px solid #c0dcea;
  background:#fff;font-size:.73rem;cursor:pointer;color:#4a6572;
  font-family:'Noto Sans JP',sans-serif;transition:all .12s}
.opt-btn.on{background:#1e8fb5;border-color:#1e8fb5;color:#fff}
.krow{display:flex;align-items:center;justify-content:space-between;
  padding:7px 0;border-bottom:1px solid #e4f4fb;gap:6px;font-size:.8rem}
.krow:last-child{border:none}
.krow-date{font-weight:700;min-width:65px;font-size:.78rem}
.krow-info{color:#4a6572;font-size:.68rem}
.krow-cnt{font-size:.7rem;white-space:nowrap}
.btn-del{border:1px solid #d94f4f;color:#d94f4f;background:none;
  border-radius:4px;padding:2px 8px;font-size:.7rem;cursor:pointer}
.danger-note{font-size:.68rem;color:#4a6572;margin-top:8px;line-height:1.6}

/* ===== 書き出しタブ ===== */
.export-area{padding:16px}
.export-preview{background:#fff;border:1px solid #d0e8f0;border-radius:8px;
  padding:16px;margin-bottom:14px;min-height:120px}
.export-title-bar{font-size:.88rem;font-weight:700;color:#1e8fb5;margin-bottom:10px;
  padding-bottom:8px;border-bottom:1px solid #e4f4fb;text-align:center}
.exp-row{display:flex;gap:12px;align-items:flex-start;padding:7px 0;
  border-bottom:1px solid #f0f8fc}
.exp-row:last-child{border:none}
.exp-date{font-weight:700;font-size:.82rem;color:#1e8fb5;min-width:105px;flex-shrink:0}
.exp-chips{display:flex;flex-wrap:wrap;gap:4px}
.exp-chip{background:#e4f4fb;color:#1e6f8f;border:1px solid #b3dff0;
  padding:2px 9px;border-radius:10px;font-size:.72rem}

/* トースト */
.toast{position:fixed;bottom:72px;left:50%;
  transform:translateX(-50%) translateY(10px);
  background:#1a2e38;color:#fff;padding:8px 18px;border-radius:20px;
  font-size:.78rem;opacity:0;transition:all .22s;pointer-events:none;
  z-index:600;white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

.empty{text-align:center;padding:30px;color:#4a6572;font-size:.82rem;line-height:1.8}
</style>
</head>
<body>

<!-- ローディング -->
<div id="loading"><div class="spin"></div></div>

<!-- セットアップ -->
<div id="setup">
  <div class="setup-box">
    <div class="setup-title">🔧 初期設定</div>
    <div class="setup-note">GASのウェブアプリURLを入力してください。</div>
    <div class="f-group">
      <label class="f-label">GAS ウェブアプリURL</label>
      <input class="f-input" id="setup-url" type="url" placeholder="https://script.google.com/macros/s/...">
    </div>
    <button class="btn btn-sky btn-full" onclick="saveUrl()">保存して接続</button>
  </div>
</div>

<!-- ===== メイン ===== -->
<div id="main" style="display:none">

  <!-- ボトムタブ -->
  <div class="bottom-tabs">
    <button class="btab on" onclick="showTab('input',this)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      <span class="btab-label">入力</span>
    </button>
    <button class="btab" onclick="showTab('kanri',this)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
      <span class="btab-label">管理</span>
    </button>
    <button class="btab" onclick="showTab('export',this)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <span class="btab-label">書き出し</span>
    </button>
  </div>

  <!-- ===== 入力タブ ===== -->
  <div id="tab-input" class="tab-pane on">

    <!-- 名前バー -->
    <div class="name-bar">
      <span class="name-label">お名前：</span>
      <input class="name-input" id="my-name" type="text" placeholder="芸名を入力" autocomplete="name" oninput="onNameInput()">
    </div>

    <!-- 自分の回答管理 -->
    <div class="my-reply-bar" id="my-reply-bar" style="display:none">
      <div class="my-reply-info" id="my-reply-info"></div>
      <button class="btn-my-del" onclick="deleteMyReplies()">自分の回答を全部削除して入力し直す</button>
    </div>

    <div class="drag-hint">← 横にスクロールすると全員分が見られます →</div>

    <!-- 出欠表 -->
    <div class="table-wrap">
      <table id="main-table">
        <thead id="t-head"></thead>
        <tbody id="t-body"></tbody>
      </table>
    </div>

    <!-- 送信バー -->
    <div class="send-bar">
      <div class="send-info" id="send-info">お名前を入力してください</div>
      <button class="btn-send" id="btn-send" onclick="sendAll()" disabled>送　信</button>
    </div>

    <!-- 予定を組むボタン -->
    <div class="plan-bar">
      <button class="btn-plan" onclick="openPlanModal()">✦ 予定を組む</button>
    </div>

  </div>

  <!-- ===== 管理タブ ===== -->
  <div id="tab-kanri" class="tab-pane">

    <!-- 曜日一括登録 -->
    <div class="card">
      <div class="card-head">曜日で一括登録</div>
      <div class="f-row">
        <div class="f-group"><label class="f-label">年</label><select class="f-select" id="bulk-year"></select></div>
        <div class="f-group" style="flex:2">
          <label class="f-label">月（複数可）</label>
          <div class="month-grid" id="bulk-months">
            <label class="mchk"><input type="checkbox" value="1">1月</label>
            <label class="mchk"><input type="checkbox" value="2">2月</label>
            <label class="mchk"><input type="checkbox" value="3">3月</label>
            <label class="mchk"><input type="checkbox" value="4">4月</label>
            <label class="mchk"><input type="checkbox" value="5">5月</label>
            <label class="mchk"><input type="checkbox" value="6">6月</label>
            <label class="mchk"><input type="checkbox" value="7">7月</label>
            <label class="mchk"><input type="checkbox" value="8">8月</label>
            <label class="mchk"><input type="checkbox" value="9">9月</label>
            <label class="mchk"><input type="checkbox" value="10">10月</label>
            <label class="mchk"><input type="checkbox" value="11">11月</label>
            <label class="mchk"><input type="checkbox" value="12">12月</label>
          </div>
        </div>
      </div>
      <div class="f-row">
        <div class="f-group"><label class="f-label">曜日</label>
          <select class="f-select" id="bulk-dow">
            <option value="0">日</option><option value="1">月</option>
            <option value="2">火</option><option value="3" selected>水</option>
            <option value="4">木</option><option value="5">金</option><option value="6">土</option>
          </select>
        </div>
        <div class="f-group" style="flex:2"><label class="f-label">公演名</label>
          <input class="f-input" id="bulk-name" value="定例会">
        </div>
      </div>
      <div class="f-row">
        <div class="f-group"><label class="f-label">時間（任意）</label><input class="f-input" id="bulk-time" type="time"></div>
        <div class="f-group" style="flex:2"><label class="f-label">会場（任意）</label><input class="f-input" id="bulk-venue"></div>
      </div>
      <button class="btn btn-sky btn-full" onclick="bulkAdd()">一括登録する</button>
    </div>

    <!-- 1件登録 -->
    <div class="card">
      <div class="card-head">１件登録</div>
      <div class="f-row">
        <div class="f-group"><label class="f-label">日付</label><input class="f-input" id="s-date" type="date"></div>
        <div class="f-group" style="flex:2"><label class="f-label">公演名</label><input class="f-input" id="s-name" placeholder="特別公演"></div>
      </div>
      <div class="f-row">
        <div class="f-group"><label class="f-label">時間（任意）</label><input class="f-input" id="s-time" type="time"></div>
        <div class="f-group" style="flex:2"><label class="f-label">会場（任意）</label><input class="f-input" id="s-venue"></div>
      </div>
      <button class="btn btn-outline btn-full" onclick="singleAdd()">追加する</button>
    </div>

    <!-- 番組の条件設定 -->
    <div class="card">
      <div class="card-head">番組を組む条件（設定者のみ）</div>
      <div class="opt-label">出演回数の割り振り</div>
      <div class="opt-grp" id="og-count">
        <button class="opt-btn on" data-v="equal">均等に割り振る</button>
        <button class="opt-btn" data-v="free">回数は不問</button>
      </div>
      <div class="opt-label">芸種のバランス</div>
      <div class="opt-grp" id="og-geishu">
        <button class="opt-btn on" data-v="equal">均等に入れる</button>
        <button class="opt-btn" data-v="kodan">講談多め</button>
        <button class="opt-btn" data-v="free">バランス不問</button>
      </div>
      <div class="f-row">
        <div class="f-group"><label class="f-label">最小人数</label><input class="f-input" id="cfg-minP" type="number" value="3" min="1" max="10"></div>
        <div style="padding-top:22px;color:#4a6572">〜</div>
        <div class="f-group"><label class="f-label">最大人数</label><input class="f-input" id="cfg-maxP" type="number" value="5" min="1" max="10"></div>
      </div>
      <div class="opt-label">仲入り</div>
      <div class="opt-grp" id="og-nakairi">
        <button class="opt-btn on" data-v="middle">中間に入れる</button>
        <button class="opt-btn" data-v="none">なし</button>
      </div>
      <button class="btn btn-sky btn-full" onclick="saveConfig()">条件を保存</button>
    </div>

    <!-- 登録済み公演一覧 -->
    <div class="card">
      <div class="card-head">登録済みの公演日程</div>
      <div id="admin-koen-list"><div class="empty">公演がありません</div></div>
    </div>

    <!-- データ操作 -->
    <div class="card" style="border-color:#f0c8c8">
      <div class="card-head" style="color:#d94f4f">データ操作</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn btn-amber btn-full" onclick="doArchive()">本日以前をアーカイブ</button>
        <button class="btn btn-danger btn-full" onclick="doReset()">全回答をリセット</button>
        <button class="btn btn-outline btn-full" onclick="syncAll()">データを再読み込み</button>
      </div>
      <div class="danger-note">
        ※ アーカイブ：公演に済フラグ。毎月1日に自動実行されます。<br>
        ※ リセット：全員の回答が消えます。公演日程は残ります。
      </div>
    </div>

    <!-- GAS URL設定 -->
    <div class="card">
      <div class="card-head">接続設定</div>
      <div class="f-group"><label class="f-label">GAS ウェブアプリURL</label>
        <input class="f-input" id="cfg-url" type="url">
      </div>
      <button class="btn btn-outline btn-full" onclick="saveUrlFromCfg()">URLを保存</button>
    </div>

  </div>

  <!-- ===== 書き出しタブ ===== -->
  <div id="tab-export" class="tab-pane">
    <div class="export-area">
      <div style="margin-bottom:10px">
        <label class="f-label">対象期間</label>
        <select class="f-select" id="exp-months" onchange="renderExportPreview()">
          <option value="2">直近2ヶ月</option>
          <option value="3">直近3ヶ月</option>
          <option value="6">直近6ヶ月</option>
          <option value="0">全期間</option>
        </select>
      </div>
      <div class="export-preview" id="export-preview">
        <div class="empty">管理タブで公演日程を登録してください</div>
      </div>
      <button class="btn btn-sky btn-full" onclick="exportJpg()">📷 JPGとして保存する</button>
      <div style="font-size:.7rem;color:#4a6572;text-align:center;margin-top:8px;line-height:1.6">
        ※ スマホでは「スクリーンショット」でも保存できます
      </div>
    </div>
  </div>

</div>

<!-- ===== 番組モーダル ===== -->
<div id="plan-modal" class="hidden">
  <div class="plan-box">
    <div class="plan-box-head">
      <span class="plan-box-title">✦ 予定を組む</span>
      <button class="btn-close" onclick="closePlanModal()">✕</button>
    </div>
    <div class="f-group">
      <label class="f-label">公演を選ぶ</label>
      <select class="f-select plan-koen-sel" id="plan-koen-sel" onchange="loadPlanCast()">
        <option value="">選択してください</option>
      </select>
    </div>
    <div id="plan-cast-area"></div>
    <div id="plan-save-area" style="display:none;margin-top:12px">
      <button class="btn btn-sky btn-full" onclick="savePlanCast()">この番組を確定・保存</button>
    </div>
  </div>
</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<!-- JPG出力用 -->
<div id="jpg-src" style="position:fixed;left:-9999px;top:0;width:720px;background:#fff;font-family:Noto Sans JP,sans-serif"></div>

<script>
// ===== 設定・状態 =====
const GAS_KEY = 'ens_url_v2';
let GAS_URL   = localStorage.getItem(GAS_KEY) || '';
let D = { koens:[], replies:[], casts:[], config:{} };
let pending   = {};   // { koenId: status }
let planCast  = [];
let planKoenId= '';
const DOW = ['日','月','火','水','木','金','土'];

// ===== 起動 =====
window.onload = function() {
  initYear(); initMonths(); initOptGroups();
  if (!GAS_URL) { hideL(); show('setup'); }
  else syncAll();
};

// ===== 通信 =====
async function gas(body) {
  if (!GAS_URL) { toast('URLが未設定です'); return null; }
  try {
    // GETパラメータで渡す（iOS SafariのCORSエラーを回避）
    const params = new URLSearchParams();
    Object.entries(body).forEach(([k,v]) => {
      params.set(k, typeof v === 'object' ? JSON.stringify(v) : String(v));
    });
    const url = GAS_URL + '?' + params.toString();
    const r = await fetch(url, { redirect:'follow' });
    return await r.json();
  } catch(e) { toast('通信エラー: '+e.message); return null; }
}

async function syncAll() {
  showL();
  const d = await gas({action:'getAll'});
  hideL();
  if (!d || !d.ok) { toast('読み込み失敗'); return; }
  D = d;
  applyConfig();
  autoArchiveCheck();
  renderTable();
  renderAdminList();
  renderPlanSel();
  renderExportPreview();
  updateMyReplyBar();
  toast('読み込みました');
}

// ===== 自動アーカイブ =====
function autoArchiveCheck() {
  const t = todayStr(), f = t.slice(0,7)+'-01';
  if (t === f) gas({action:'archiveBefore',before:f}).then(()=>syncAll());
}

// ===== URL =====
function saveUrl() {
  const v = document.getElementById('setup-url').value.trim();
  if (!v) { toast('URLを入力してください'); return; }
  GAS_URL = v; localStorage.setItem(GAS_KEY, v);
  hide('setup'); syncAll();
}
function saveUrlFromCfg() {
  const v = document.getElementById('cfg-url').value.trim();
  if (!v) { toast('URLを入力してください'); return; }
  GAS_URL = v; localStorage.setItem(GAS_KEY, v);
  toast('保存しました');
}

// ===== タブ =====
function showTab(name, btn) {
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.btab').forEach(b=>b.classList.remove('on'));
  document.getElementById('tab-'+name).classList.add('on');
  btn.classList.add('on');
  if (name==='export') renderExportPreview();
  if (name==='kanri') {
    document.getElementById('cfg-url').value = GAS_URL;
    renderAdminList();
  }
}

// ===== 名前入力 =====
function onNameInput() {
  pending = {};
  renderTable();
  updateSendBtn();
  updateMyReplyBar();
}

function updateMyReplyBar() {
  const name = myName();
  const bar  = document.getElementById('my-reply-bar');
  const info = document.getElementById('my-reply-info');
  if (!name) { bar.style.display='none'; return; }
  const myReps = D.replies.filter(r=>r.name===name);
  if (!myReps.length) { bar.style.display='none'; return; }
  bar.style.display='flex';
  const ok  = myReps.filter(r=>r.status==='ok').length;
  const ng  = myReps.filter(r=>r.status==='ng').length;
  const dt  = myReps.filter(r=>r.status==='delta').length;
  info.textContent = `${name} さんの回答：○${ok} △${dt} ×${ng}`;
}

// 自分の回答を全削除して入力し直し
async function deleteMyReplies() {
  const name = myName();
  if (!name) return;
  if (!confirm(`「${name}」さんの全回答を削除して入力し直しますか？`)) return;
  const r = await gas({action:'deleteReply', name});
  if (r && r.ok) {
    D.replies = D.replies.filter(r=>r.name!==name);
    pending = {};
    renderTable(); updateSendBtn(); updateMyReplyBar();
    toast('削除しました。入力し直してください');
  }
}

// ===== 出欠表 =====
function renderTable() {
  const koens = D.koens.filter(k=>!k.archived);
  const name  = myName();
  const names = getNames();

  // ヘッダー
  let hh = '<tr><th class="th-date">日程</th>'
    + '<th class="th-cnt" title="出演○">○</th>'
    + '<th class="th-cnt" title="検討△">△</th>'
    + '<th class="th-cnt" title="欠席×">×</th>';
  names.forEach(n => {
    const mine = n===name ? ' style="background:#127a9a"' : '';
    hh += `<th class="th-name"${mine}>${n}</th>`;
  });
  hh += '</tr>';
  document.getElementById('t-head').innerHTML = hh;

  // 行
  let tb = '';
  koens.forEach(k => {
    const d   = parseDate(k.date);
    const lbl = (d.getMonth()+1)+'/'+d.getDate()+'('+DOW[d.getDay()]+')';
    const sub = k.name + (k.time?' '+k.time:'');
    const reps = D.replies.filter(r=>r.koenId===k.id);
    const ok = reps.filter(r=>r.status==='ok').length;
    const ng = reps.filter(r=>r.status==='ng').length;
    const dt = reps.filter(r=>r.status==='delta').length;

    tb += `<tr>
      <td class="td-date">${lbl}<br><span style="font-size:.65rem;font-weight:400;color:#4a6572">${sub}</span></td>
      <td class="td-cnt" style="color:#1a7a48">${ok}</td>
      <td class="td-cnt" style="color:#b07020">${dt}</td>
      <td class="td-cnt" style="color:#c03030">${ng}</td>`;

    names.forEach(n => {
      let s = (n===name && pending[k.id]) ? pending[k.id]
            : (reps.find(r=>r.name===n)||{}).status || null;
      const sym = s==='ok'?'○': s==='ng'?'×': s==='delta'?'△':'－';
      const cc  = s==='ok'?'c-ok': s==='ng'?'c-ng': s==='delta'?'c-dt':'';
      const tap = n===name ? ` c-mine c-tap" onclick="cycleCell('${k.id}',this)` : ``;
      tb += `<td class="${cc}${tap}">${sym}</td>`;
    });
    tb += '</tr>';
  });

  // 合計行
  if (names.length) {
    tb += '<tr class="sum-row"><td class="td-date" style="font-size:.68rem;font-weight:700">出演合計</td><td colspan="3"></td>';
    names.forEach(n => {
      const cnt = D.replies.filter(r=>r.name===n&&r.status==='ok').length;
      tb += `<td style="color:#1e8fb5;font-size:.78rem">${cnt}</td>`;
    });
    tb += '</tr>';
  }

  document.getElementById('t-body').innerHTML = tb ||
    '<tr><td colspan="10" style="text-align:center;padding:24px;color:#4a6572">公演日程がありません<br><span style="font-size:.75rem">管理タブから登録してください</span></td></tr>';
}

function getNames() {
  const s = new Set(D.replies.map(r=>r.name));
  const n = myName(); if (n) s.add(n);
  return Array.from(s);
}

function cycleCell(koenId, td) {
  const name = myName();
  if (!name) { toast('先にお名前を入力してください'); return; }
  const cycle = [null,'ok','delta','ng'];
  const cur = pending[koenId] || (D.replies.find(r=>r.koenId===koenId&&r.name===name)||{}).status || null;
  const next = cycle[(cycle.indexOf(cur)+1)%cycle.length];
  if (next===null) delete pending[koenId];
  else pending[koenId] = next;
  renderTable(); updateSendBtn();
}

function updateSendBtn() {
  const name = myName();
  const cnt  = Object.keys(pending).length;
  const btn  = document.getElementById('btn-send');
  const info = document.getElementById('send-info');
  if (!name) {
    info.textContent = 'お名前を入力してください'; btn.disabled=true; return;
  }
  if (!cnt) {
    info.innerHTML = `<strong>${name}</strong> さん、セルをタップして○△×を選んでください`;
    btn.disabled=true; return;
  }
  info.innerHTML = `<strong>${name}</strong> さん　${cnt}件を変更中`;
  btn.disabled=false;
}

// ===== 送信 =====
async function sendAll() {
  const name = myName();
  if (!name || !Object.keys(pending).length) return;
  document.getElementById('btn-send').disabled = true;
  let ok = true;
  for (const [koenId, status] of Object.entries(pending)) {
    const r = await gas({action:'saveReply', koenId, name, status, geishu:''});
    if (!r || !r.ok) { ok=false; break; }
    const idx = D.replies.findIndex(r=>r.koenId===koenId&&r.name===name);
    if (idx>=0) D.replies[idx].status=status;
    else D.replies.push({koenId, name, status, geishu:''});
  }
  pending = {};
  renderTable(); updateSendBtn(); updateMyReplyBar();
  toast(ok ? '送信しました ✓' : '一部失敗しました');
}

// ===== 番組モーダル =====
function openPlanModal() {
  renderPlanSel();
  document.getElementById('plan-modal').classList.remove('hidden');
}
function closePlanModal() {
  document.getElementById('plan-modal').classList.add('hidden');
}

function renderPlanSel() {
  const sel = document.getElementById('plan-koen-sel');
  const cur = sel.value;
  sel.innerHTML = '<option value="">選択してください</option>';
  D.koens.filter(k=>!k.archived).forEach(k=>{
    const d = parseDate(k.date);
    const lbl = (d.getMonth()+1)+'/'+d.getDate()+'('+DOW[d.getDay()]+') '+k.name;
    const o = document.createElement('option');
    o.value=k.id; o.textContent=lbl;
    if (k.id===cur) o.selected=true;
    sel.appendChild(o);
  });
}

function loadPlanCast() {
  planKoenId = document.getElementById('plan-koen-sel').value;
  if (!planKoenId) { document.getElementById('plan-cast-area').innerHTML=''; document.getElementById('plan-save-area').style.display='none'; return; }

  // 既存番組があれば読み込む
  const ex = D.casts.filter(c=>c.koenId===planKoenId).sort((a,b)=>a.order-b.order);
  if (ex.length) {
    planCast = ex.map(c=>({name:c.name, geishu:c.geishu, neta:c.neta}));
    renderPlanCast();
  } else {
    // 自動提案
    autoPlan();
  }
  document.getElementById('plan-save-area').style.display='block';
}

function autoPlan() {
  const cfg    = D.config;
  const reps   = D.replies.filter(r=>r.koenId===planKoenId&&(r.status==='ok'||r.status==='delta'));
  if (!reps.length) {
    document.getElementById('plan-cast-area').innerHTML = '<div class="empty">この公演の出演可能な回答がありません</div>';
    return;
  }
  const minP = parseInt(cfg.minP)||3;
  const maxP = parseInt(cfg.maxP)||5;
  const cntMode  = cfg.countMode  || 'equal';
  const gMode    = cfg.geishuMode || 'equal';
  const cntMap   = {};
  D.replies.filter(r=>r.status==='ok').forEach(r=>{ cntMap[r.name]=(cntMap[r.name]||0)+1; });

  let pool = reps.slice();
  if (cntMode==='equal') pool.sort((a,b)=>(cntMap[a.name]||0)-(cntMap[b.name]||0));
  const cnt = Math.min(maxP, Math.max(minP, pool.length));
  let cast=[];

  if (gMode==='equal') {
    const byG={};
    pool.forEach(p=>{const g=p.geishu||'その他';(byG[g]=byG[g]||[]).push(p);});
    const keys=Object.keys(byG);
    for(let ki=0;cast.length<cnt&&ki<cnt+5;ki++)
      for(let i=0;i<keys.length&&cast.length<cnt;i++){
        const a=(byG[keys[(ki+i)%keys.length]]||[]).filter(p=>!cast.includes(p));
        if(a.length) cast.push(a[0]);
      }
    pool.forEach(p=>{if(cast.length<cnt&&!cast.includes(p))cast.push(p);});
  } else if (gMode==='kodan') {
    cast=pool.filter(p=>p.geishu==='講談').concat(pool.filter(p=>p.geishu!=='講談')).slice(0,cnt);
  } else {
    cast=pool.slice(0,cnt);
  }
  if (cntMode==='equal') cast.sort((a,b)=>(cntMap[a.name]||0)-(cntMap[b.name]||0));
  planCast = cast.map(p=>({name:p.name, geishu:p.geishu||'', neta:''}));
  renderPlanCast();
}

function renderPlanCast() {
  const cfg = D.config;
  const nakairi = cfg.nakairi || 'middle';
  const ni = Math.floor(planCast.length/2);
  let html='';
  planCast.forEach((p,i)=>{
    if (nakairi==='middle' && i===ni) html+='<div class="nakairi-div">〜 仲 入 り 〜</div>';
    const role = i===planCast.length-1?'トリ': i===0?'前座':'中堅';
    html+=`<div class="cast-row">
      <div class="cast-num">${i+1}</div>
      <div><div class="cast-name">${p.name}</div><div class="cast-role">${role}${p.geishu?' / '+p.geishu:''}</div></div>
      <input class="neta" placeholder="演目" value="${p.neta||''}" onchange="planCast[${i}].neta=this.value">
    </div>`;
  });
  document.getElementById('plan-cast-area').innerHTML =
    html ? `<div style="border:1px solid #d0e8f0;border-radius:8px;padding:10px;background:#fff;margin-bottom:8px">${html}</div>` : '<div class="empty">出演候補がありません</div>';
}

async function savePlanCast() {
  if (!planKoenId || !planCast.length) { toast('番組が空です'); return; }
  const cast = planCast.map((p,i)=>({order:i+1, name:p.name, geishu:p.geishu, neta:p.neta||''}));
  const r = await gas({action:'saveCast', koenId:planKoenId, cast});
  if (r && r.ok) {
    D.casts = D.casts.filter(c=>c.koenId!==planKoenId);
    cast.forEach((c,i)=>D.casts.push({id:'_'+i, koenId:planKoenId, ...c}));
    toast('番組を保存しました');
    closePlanModal();
    renderExportPreview();
  }
}

// ===== 管理 =====
async function bulkAdd() {
  const year  = parseInt(document.getElementById('bulk-year').value);
  const dow   = document.getElementById('bulk-dow').value;
  const name  = document.getElementById('bulk-name').value.trim()||'定例会';
  const time  = document.getElementById('bulk-time').value;
  const venue = document.getElementById('bulk-venue').value.trim();
  const chk   = Array.from(document.querySelectorAll('#bulk-months input:checked'));
  if (!chk.length) { toast('月を選択してください'); return; }
  const yearMonths = chk.map(c=>({year, month:parseInt(c.value)}));
  toast('登録中…');
  const r = await gas({action:'addKoens', yearMonths, dow, name, time, venue});
  if (r && r.ok) { toast(r.added.length+'件登録しました'); await syncAll(); }
}

async function singleAdd() {
  const date  = document.getElementById('s-date').value;
  const name  = document.getElementById('s-name').value.trim()||'定例会';
  const time  = document.getElementById('s-time').value;
  const venue = document.getElementById('s-venue').value.trim();
  if (!date) { toast('日付を選択してください'); return; }
  const r = await gas({action:'addKoen', date, name, time, venue});
  if (r && r.ok) { toast('追加しました'); await syncAll(); }
}

async function saveConfig() {
  const r = await gas({
    action: 'saveConfig',
    countMode:  getOpt('og-count'),
    geishuMode: getOpt('og-geishu'),
    nakairi:    getOpt('og-nakairi'),
    minP:       document.getElementById('cfg-minP').value,
    maxP:       document.getElementById('cfg-maxP').value,
  });
  if (r && r.ok) { toast('条件を保存しました'); D.config = await gas({action:'getAll'}).then(d=>d.config); }
}

async function delKoen(id) {
  if (!confirm('この公演と関連データを削除しますか？')) return;
  const r = await gas({action:'deleteKoen', id});
  if (r && r.ok) { toast('削除しました'); await syncAll(); }
}

function renderAdminList() {
  const el = document.getElementById('admin-koen-list');
  if (!D.koens.length) { el.innerHTML='<div class="empty">公演がありません</div>'; return; }
  el.innerHTML = D.koens.map(k=>{
    const d   = parseDate(k.date);
    const lbl = (d.getMonth()+1)+'/'+d.getDate()+'('+DOW[d.getDay()]+')';
    const ok  = D.replies.filter(r=>r.koenId===k.id&&r.status==='ok').length;
    const ng  = D.replies.filter(r=>r.koenId===k.id&&r.status==='ng').length;
    const dt  = D.replies.filter(r=>r.koenId===k.id&&r.status==='delta').length;
    return `<div class="krow">
      <div>
        <div class="krow-date">${lbl} ${k.name}${k.archived?' 【済】':''}</div>
        <div class="krow-info">${k.time||''} ${k.venue||''}</div>
      </div>
      <div class="krow-cnt">
        <span style="color:#1a7a48">○${ok}</span>
        <span style="color:#b07020;margin:0 3px">△${dt}</span>
        <span style="color:#c03030">×${ng}</span>
      </div>
      <button class="btn-del" onclick="delKoen('${k.id}')">削除</button>
    </div>`;
  }).join('');
}

async function doArchive() {
  if (!confirm('本日以前の公演をアーカイブします。')) return;
  const r = await gas({action:'archiveBefore', before:todayStr()});
  if (r && r.ok) { toast(r.count+'件アーカイブしました'); await syncAll(); }
}
async function doReset() {
  if (!confirm('全員の回答をリセットします。取り消せません。')) return;
  const r = await gas({action:'resetReplies', all:true});
  if (r && r.ok) { toast('リセットしました'); await syncAll(); }
}

// ===== 書き出し =====
function renderExportPreview() {
  const months = parseInt(document.getElementById('exp-months').value)||2;
  const today  = todayStr();
  const cutoff = months>0 ? monthsAgoStr(months) : '0000-00-00';
  const targets = D.koens.filter(k=>!k.archived && k.date>=cutoff);
  const el = document.getElementById('export-preview');
  if (!targets.length) { el.innerHTML='<div class="empty">対象の公演がありません</div>'; return; }

  const parts = today.split('-');
  const period = months>0
    ? parts[0]+'年'+parseInt(parts[1])+'月〜'+(parseInt(parts[1])+months-1)+'月'
    : '全期間';

  el.innerHTML = `<div class="export-title-bar">出演予定一覧　${period}</div>`
    + targets.map(k=>{
        const d   = parseDate(k.date);
        const lbl = (d.getMonth()+1)+'月'+d.getDate()+'日（'+DOW[d.getDay()]+'）';
        const cast = D.casts.filter(c=>c.koenId===k.id).sort((a,b)=>a.order-b.order);
        const people = cast.length
          ? cast.map(c=>`<span class="exp-chip">${c.name}</span>`).join('')
          : D.replies.filter(r=>r.koenId===k.id&&r.status==='ok')
              .map(r=>`<span class="exp-chip">${r.name}</span>`).join('');
        return `<div class="exp-row">
          <div class="exp-date">${lbl}<br><span style="font-size:.7rem;color:#4a6572;font-weight:400">${k.name}${k.time?' '+k.time:''}</span></div>
          <div class="exp-chips">${people||'<span style="color:#aaa;font-size:.72rem">未定</span>'}</div>
        </div>`;
      }).join('');
}

async function exportJpg() {
  const months = parseInt(document.getElementById('exp-months').value)||2;
  const today  = todayStr();
  const cutoff = months>0 ? monthsAgoStr(months) : '0000-00-00';
  const targets = D.koens.filter(k=>!k.archived&&k.date>=cutoff);
  const parts = today.split('-');
  const period = months>0
    ? parts[0]+'年'+parseInt(parts[1])+'月〜'+(parseInt(parts[1])+months-1)+'月'
    : '全期間';

  const src = document.getElementById('jpg-src');
  src.innerHTML = `<div style="padding:24px">
    <div style="text-align:center;font-size:1.1rem;font-weight:700;color:#1e8fb5;
      padding-bottom:12px;border-bottom:2px solid #b3dff0;margin-bottom:14px">
      出演予定一覧　${period}
    </div>`
    + targets.map(k=>{
        const d   = parseDate(k.date);
        const lbl = (d.getMonth()+1)+'月'+d.getDate()+'日（'+DOW[d.getDay()]+'）';
        const cast = D.casts.filter(c=>c.koenId===k.id).sort((a,b)=>a.order-b.order);
        const chips = (cast.length
          ? cast.map(c=>`<span style="background:#e4f4fb;color:#1e6f8f;border:1px solid #b3dff0;padding:2px 9px;border-radius:10px;font-size:.75rem">${c.name}</span>`)
          : D.replies.filter(r=>r.koenId===k.id&&r.status==='ok')
              .map(r=>`<span style="background:#e4f4fb;color:#1e6f8f;border:1px solid #b3dff0;padding:2px 9px;border-radius:10px;font-size:.75rem">${r.name}</span>`)
        ).join(' ');
        return `<div style="display:flex;gap:12px;align-items:flex-start;padding:8px 0;border-bottom:1px solid #f0f8fc">
          <div style="min-width:110px;font-weight:700;font-size:.88rem;color:#1e8fb5;flex-shrink:0">
            ${lbl}<br><span style="font-size:.72rem;color:#4a6572;font-weight:400">${k.name}${k.time?' '+k.time:''}</span>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:4px">${chips||'<span style="color:#aaa;font-size:.75rem">未定</span>'}</div>
        </div>`;
      }).join('')+'</div>';

  if (typeof html2canvas !== 'undefined') {
    const canvas = await html2canvas(src.firstChild, {scale:2, backgroundColor:'#fff'});
    const a = document.createElement('a');
    a.download = '出演予定_'+today+'.jpg';
    a.href = canvas.toDataURL('image/jpeg', .92);
    a.click(); toast('JPGを保存しました');
  } else {
    // スクリーンショット用に全画面表示
    src.style.cssText = 'position:fixed;left:0;top:0;z-index:9999;background:#fff;width:100%;overflow:auto;max-height:100vh';
    toast('スクリーンショットで保存してください。タップで閉じます。');
    src.onclick = ()=>{ src.style.cssText='position:fixed;left:-9999px;top:0;width:720px;background:#fff;font-family:Noto Sans JP,sans-serif'; };
  }
}

// ===== 設定適用 =====
function applyConfig() {
  const cfg = D.config||{};
  setOpt('og-count',   cfg.countMode  || 'equal');
  setOpt('og-geishu',  cfg.geishuMode || 'equal');
  setOpt('og-nakairi', cfg.nakairi    || 'middle');
  if (cfg.minP) document.getElementById('cfg-minP').value = cfg.minP;
  if (cfg.maxP) document.getElementById('cfg-maxP').value = cfg.maxP;
}
function setOpt(id, val) {
  document.querySelectorAll('#'+id+' .opt-btn').forEach(b=>{
    b.classList.toggle('on', b.dataset.v===val);
  });
}

// ===== opt-grp =====
function initOptGroups() {
  document.querySelectorAll('.opt-grp').forEach(g=>{
    g.addEventListener('click',function(e){
      const b=e.target.closest('.opt-btn'); if(!b) return;
      g.querySelectorAll('.opt-btn').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
    });
  });
}
function getOpt(id) { const b=document.querySelector('#'+id+' .opt-btn.on'); return b?b.dataset.v:null; }

// ===== ユーティリティ =====
function myName()  { return document.getElementById('my-name').value.trim(); }
function show(id)  { document.getElementById(id).style.display='block'; }
function hide(id)  { document.getElementById(id).style.display='none'; }
function showL()   { const l=document.getElementById('loading'); l.style.display='flex'; l.classList.remove('off'); }
function hideL()   { const l=document.getElementById('loading'); l.classList.add('off'); setTimeout(()=>l.style.display='none',350); }
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function pad(n)    { return String(n).padStart(2,'0'); }
function monthsAgoStr(n){ const d=new Date(); d.setMonth(d.getMonth()-n+1); d.setDate(1); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-01'; }
function parseDate(s){ const p=s.split('-').map(Number); return new Date(p[0],p[1]-1,p[2]); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('on'); setTimeout(()=>t.classList.remove('on'),2400); }
function initYear(){ const s=document.getElementById('bulk-year'),y=new Date().getFullYear(); for(let i=y;i<=y+2;i++){const o=document.createElement('option');o.value=i;o.textContent=i+'年';if(i===y)o.selected=true;s.appendChild(o);} }
function initMonths(){ const n=new Date().getMonth()+1; document.querySelectorAll('#bulk-months input').forEach(c=>{const v=parseInt(c.value);if(v===n||v===(n%12)+1)c.checked=true;}); }
</script>
