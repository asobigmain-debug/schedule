<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出演予定</title>
<style>
body{font-family:sans-serif;padding:20px;background:#f0f8fc}
.box{background:white;border-radius:8px;padding:16px;margin-bottom:12px;border:1px solid #cce}
h2{color:#1e8fb5;font-size:1rem;margin-bottom:10px}
input{width:100%;padding:8px;border:1px solid #cce;border-radius:4px;font-size:.9rem;margin-bottom:8px;box-sizing:border-box}
button{background:#1e8fb5;color:white;border:none;border-radius:4px;padding:10px 16px;font-size:.9rem;cursor:pointer;width:100%}
.result{background:#e8f8ff;border:1px solid #b3dff0;border-radius:4px;padding:10px;margin-top:10px;font-size:.8rem;word-break:break-all;min-height:40px}
.ok{color:#1a7a48;font-weight:bold}
.err{color:#c03030;font-weight:bold}
.saved{background:#d4f5e4;border-color:#3aaa6e}
</style>
</head>
<body>

<div class="box">
  <h2>① 保存済みのGAS URL</h2>
  <div class="result" id="saved-url">確認中…</div>
  <button onclick="clearUrl()" style="background:#d94f4f;margin-top:8px">URLをリセット（消去）</button>
</div>

<div class="box">
  <h2>② GAS URLを設定する</h2>
  <input id="gas-url" type="url" placeholder="https://script.google.com/macros/s/.../exec">
  <button onclick="saveUrl()">保存する</button>
  <div class="result" id="save-result"></div>
</div>

<div class="box">
  <h2>③ GAS接続テスト</h2>
  <button onclick="testGas()">接続テストする</button>
  <div class="result" id="test-result">ボタンを押してください</div>
</div>

<script>
const KEY = 'ens_url_v2';

window.onload = function() {
  const url = localStorage.getItem(KEY) || '';
  const el = document.getElementById('saved-url');
  if (url) {
    el.textContent = url;
    el.className = 'result saved';
    document.getElementById('gas-url').value = url;
  } else {
    el.textContent = '未設定です';
  }
};

function saveUrl() {
  const url = document.getElementById('gas-url').value.trim();
  const res = document.getElementById('save-result');
  if (!url) { res.textContent = 'URLを入力してください'; return; }
  localStorage.setItem(KEY, url);
  document.getElementById('saved-url').textContent = url;
  document.getElementById('saved-url').className = 'result saved';
  res.textContent = '✓ 保存しました';
}

function clearUrl() {
  if (!confirm('GAS URLを消去します。よろしいですか？')) return;
  localStorage.removeItem(KEY);
  document.getElementById('saved-url').textContent = '未設定です';
  document.getElementById('saved-url').className = 'result';
  document.getElementById('gas-url').value = '';
  document.getElementById('save-result').textContent = '';
  alert('消去しました。新しいURLを入力してください。');
}

async function testGas() {
  const url = localStorage.getItem(KEY);
  const res = document.getElementById('test-result');
  if (!url) { res.textContent = 'まずURLを設定してください'; return; }
  res.textContent = '接続中…';
  try {
    const r = await fetch(url + '?action=getAll', { redirect: 'follow' });
    const text = await r.text();
    try {
      const json = JSON.parse(text);
      if (json.ok) {
        res.innerHTML = '<span class="ok">✓ 接続成功！</span><br>公演: ' + (json.koens||[]).length + '件 / 回答: ' + (json.replies||[]).length + '件';
      } else {
        res.textContent = 'GASエラー: ' + (json.error || JSON.stringify(json));
      }
    } catch(e) {
      res.textContent = 'レスポンスエラー（JSONではない）: ' + text.slice(0,300);
    }
  } catch(e) {
    res.textContent = '通信エラー: ' + e.message;
  }
}
</script>
</body>
</html>
