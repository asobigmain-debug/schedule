<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1e8fb5">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>出演予定</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans JP',sans-serif;background:#f0f8fc;color:#1a2e38;font-size:14px;padding-bottom:64px}
#loading{position:fixed;inset:0;background:#1e8fb5;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px}
#loading.off{display:none}
.spin{width:36px;height:36px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{color:rgba(255,255,255,.8);font-size:.82rem;letter-spacing:.1em}
.bottom-tabs{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid #d0e8f0;display:flex;z-index:100;box-shadow:0 -2px 8px rgba(30,143,181,.10)}
.btab{flex:1;padding:8px 4px 6px;text-align:center;border:none;background:transparent;color:#9cc8dc;font-size:.65rem;font-family:'Noto Sans JP',sans-serif;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
.btab.on{color:#1e8fb5}
.tab-pane{display:none}
.tab-pane.on{display:block}
.name-bar{background:#1e8fb5;padding:8px 12px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:50;box-shadow:0 2px 6px rgba(30,143,181,.25)}
.name-label{color:rgba(255,255,255,.9);font-size:.78rem;white-space:nowrap;font-weight:700}
.name-input{flex:1;border:none;border-radius:18px;padding:6px 14px;max-width:180px;font-size:.88rem;font-family:'Noto Sans JP',sans-serif;color:#1a2e38;outline:none}
.my-bar{background:#e4f4fb;padding:6px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #b3dff0;flex-wrap:wrap}
.my-bar-info{font-size:.73rem;color:#1e6f8f;flex:1}
.btn-mydel{background:#fff;border:1px solid #d94f4f;color:#d94f4f;border-radius:14px;padding:4px 12px;font-size:.7rem;cursor:pointer;font-family:'Noto Sans JP',sans-serif;white-space:nowrap}
.drag-hint{font-size:.68rem;color:#4a6572;padding:4px 12px;background:#fff;border-bottom:1px solid #d0e8f0;text-align:center}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{border-collapse:collapse;font-size:.82rem;min-width:100%}
th{background:#1e8fb5;color:#fff;padding:8px 5px;text-align:center;font-weight:700;white-space:nowrap;border:1px solid #167aa0}
th.th-d{text-align:left;padding-left:9px;min-width:88px;position:sticky;left:0;z-index:10;background:#167aa0}
th.th-c{min-width:28px;font-size:.7rem}
th.th-n{min-width:52px;max-width:68px;font-size:.72rem}
td{padding:7px 4px;border:1px solid #d0e8f0;text-align:center;background:#fff}
td.td-d{text-align:left;padding-left:8px;background:#f0f8fc;font-weight:700;white-space:nowrap;position:sticky;left:0;z-index:5;border-right:2px solid #b3dff0}
td.td-c{background:#e4f4fb;font-weight:700;font-size:.75rem}
.c-ok{background:#d4f5e4!important;color:#1a7a48;font-weight:700;font-size:1rem}
.c-ng{background:#fce4e4!important;color:#c03030;font-weight:700;font-size:1rem}
.c-dt{background:#fef5e0!important;color:#b07020;font-weight:700;font-size:1rem}
.c-mine{outline:2px solid #1e8fb5;outline-offset:-2px;cursor:pointer}
.c-tap{cursor:pointer}
tr.sum-row td{background:#dff0fb!important;font-weight:700}
.send-bar{background:#fff;border-top:2px solid #d0e8f0;padding:10px 12px;display:flex;align-items:center;gap:10px}
.send-info{flex:1;font-size:.73rem;color:#4a6572;line-height:1.5}
.send-info strong{color:#1e8fb5}
.btn-send{background:#1e8fb5;color:#fff;border:none;border-radius:22px;padding:10px 22px;font-size:.88rem;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;white-space:nowrap;flex-shrink:0;transition:background .15s}
.btn-send:disabled{background:#9cc8dc;cursor:default}
.plan-bar{padding:10px 12px;background:#fff;border-top:1px solid #d0e8f0}
.btn-plan{width:100%;padding:12px;background:linear-gradient(90deg,#1e8fb5,#2aadda);color:#fff;border:none;border-radius:8px;font-size:.92rem;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;letter-spacing:.05em;box-shadow:0 3px 10px rgba(30,143,181,.3)}
.card{background:#fff;border:1px solid #d0e8f0;border-radius:8px;padding:14px;margin:10px 12px;box-shadow:0 2px 6px rgba(30,143,181,.07)}
.card-head{font-size:.85rem;font-weight:700;color:#1e8fb5;margin-bottom:11px;padding-bottom:8px;border-bottom:1px solid #e4f4fb}
.f-label{display:block;font-size:.72rem;font-weight:700;color:#4a6572;margin-bottom:3px}
.f-input,.f-select{width:100%;padding:8px 10px;border:1px solid #c0dcea;border-radius:6px;font-size:.85rem;font-family:'Noto Sans JP',sans-serif;color:#1a2e38}
.f-input:focus,.f-select:focus{outline:none;border-color:#1e8fb5}
.f-row{display:flex;gap:8px;margin-bottom:10px;align-items:flex-end}
.f-group{flex:1;margin-bottom:10px}
.month-grid{display:flex;flex-wrap:wrap;gap:4px}
.mchk{display:inline-flex;align-items:center;gap:2px;padding:3px 8px;border-radius:12px;font-size:.72rem;border:1px solid #c0dcea;background:#fff;cursor:pointer}
.mchk input{accent-color:#1e8fb5}
.btn{padding:9px 16px;border-radius:6px;font-family:'Noto Sans JP',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;border:2px solid;transition:all .12s}
.btn-sky{background:#1e8fb5;border-color:#167aa0;color:#fff}
.btn-outline{background:transparent;border-color:#c0dcea;color:#4a6572}
.btn-danger{background:transparent;border-color:#d94f4f;color:#d94f4f}
.btn-amber{background:#d4882a;border-color:#b07020;color:#fff}
.btn-full{width:100%;display:block;text-align:center;padding:11px}
.opt-label{font-size:.72rem;font-weight:700;color:#4a6572;margin-bottom:4px}
.opt-grp{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.opt-btn{padding:4px 12px;border-radius:12px;border:1.5px solid #c0dcea;background:#fff;font-size:.73rem;cursor:pointer;color:#4a6572;font-family:'Noto Sans JP',sans-serif}
.opt-btn.on{background:#1e8fb5;border-color:#1e8fb5;color:#fff}
.krow{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #e4f4fb;gap:6px;font-size:.8rem}
.krow:last-child{border:none}
.krow-date{font-weight:700;min-width:65px;font-size:.78rem}
.krow-info{color:#4a6572;font-size:.68rem}
.btn-del{border:1px solid #d94f4f;color:#d94f4f;background:none;border-radius:4px;padding:2px 8px;font-size:.7rem;cursor:pointer}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal-bg.hidden{display:none}
.modal-box{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:560px;max-height:85vh;overflow-y:auto;padding:20px 16px 32px}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #d0e8f0}
.modal-title{font-size:.95rem;font-weight:700;color:#1e8fb5}
.btn-close{background:none;border:none;font-size:1.3rem;color:#4a6572;cursor:pointer}
.cast-row{display:grid;grid-template-columns:26px 1fr 90px;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid #e4f4fb}
.cast-row:last-child{border:none}
.cast-num{width:24px;height:24px;border-radius:50%;background:#1e8fb5;color:#fff;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700}
.cast-name{font-weight:700;font-size:.85rem}
.cast-role{font-size:.63rem;color:#4a6572}
.neta{border:1px dashed #c0dcea;border-radius:4px;padding:3px 7px;font-size:.75rem;background:#f0f8fc;width:100%;font-family:'Noto Sans JP',sans-serif}
.neta:focus{outline:none;border-color:#1e8fb5;background:#fff}
.nakairi-div{text-align:center;font-size:.72rem;color:#4a6572;padding:5px;background:#e4f4fb;border-radius:4px;margin:3px 0;letter-spacing:.1em}
.exp-preview{background:#fff;border:1px solid #d0e8f0;border-radius:8px;padding:14px;margin-bottom:12px}
.exp-title{font-size:.88rem;font-weight:700;color:#1e8fb5;text-align:center;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #e4f4fb}
.exp-row{display:flex;gap:10px;align-items:flex-start;padding:7px 0;border-bottom:1px solid #f0f8fc}
.exp-row:last-child{border:none}
.exp-date{font-weight:700;font-size:.8rem;color:#1e8fb5;min-width:100px;flex-shrink:0}
.exp-chips{display:flex;flex-wrap:wrap;gap:4px}
.exp-chip{background:#e4f4fb;color:#1e6f8f;border:1px solid #b3dff0;padding:2px 8px;border-radius:10px;font-size:.7rem}
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(10px);background:#1a2e38;color:#fff;padding:8px 18px;border-radius:20px;font-size:.78rem;opacity:0;transition:all .22s;pointer-events:none;z-index:600;white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:28px;color:#4a6572;font-size:.82rem;line-height:1.8}
.danger-note{font-size:.68rem;color:#4a6572;margin-top:8px;line-height:1.6}
</style>
</head>
<body>

<div id="loading"><div class="spin"></div><div class="load-txt">読み込み中…</div></div>

<div id="app" style="display:none">

  <!-- ボトムタブ -->
  <div class="bottom-tabs">
    <button class="btab on" onclick="showTab('input',this)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      入力
    </button>
    <button class="btab" onclick="showTab('kanri',this)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
      管理
    </button>
    <button class="btab" onclick="showTab('export',this)">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      書き出し
    </button>
  </div>

  <!-- 入力タブ -->
  <div id="tab-input" class="tab-pane on">
    <div class="name-bar">
      <span class="name-label">お名前：</span>
      <input class="name-input" id="my-name" type="text" placeholder="芸名を入力" autocomplete="name" oninput="onNameInput()">
    </div>
    <div class="my-bar" id="my-bar" style="display:none">
      <div class="my-bar-info" id="my-bar-info"></div>
      <button class="btn-mydel" onclick="deleteMyReplies()">自分の回答を削除して入力し直す</button>
    </div>
    <div class="drag-hint">← 横にスクロールすると全員分が見られます →</div>
    <div class="table-wrap">
      <table><thead id="t-head"></thead><tbody id="t-body"></tbody></table>
    </div>
    <div class="send-bar">
      <div class="send-info" id="send-info">お名前を入力してください</div>
      <button class="btn-send" id="btn-send" onclick="sendAll()" disabled>送　信</button>
    </div>
    <div class="plan-bar">
      <button class="btn-plan" onclick="openPlan()">✦ 予定を組む</button>
    </div>
  </div>

  <!-- 管理タブ -->
  <div id="tab-kanri" class="tab-pane">
    <div class="card">
      <div class="card-head">曜日で一括登録</div>
      <div class="f-row">
        <div class="f-group"><label class="f-label">年</label><select class="f-select" id="bulk-year"></select></div>
        <div class="f-group" style="flex:2"><label class="f-label">月（複数可）</label>
          <div class="month-grid" id="bulk-months">
            <label class="mchk"><input type="checkbox" value="1">1月</label><label class="mchk"><input type="checkbox" value="2">2月</label><label class="mchk"><input type="checkbox" value="3">3月</label><label class="mchk"><input type="checkbox" value="4">4月</label><label class="mchk"><input type="checkbox" value="5">5月</label><label class="mchk"><input type="checkbox" value="6">6月</label><label class="mchk"><input type="checkbox" value="7">7月</label><label class="mchk"><input type="checkbox" value="8">8月</label><label class="mchk"><input type="checkbox" value="9">9月</label><label class="mchk"><input type="checkbox" value="10">10月</label><label class="mchk"><input type="checkbox" value="11">11月</label><label class="mchk"><input type="checkbox" value="12">12月</label>
          </div>
        </div>
      </div>
      <div class="f-row">
        <div class="f-group"><label class="f-label">曜日</label>
          <select class="f-select" id="bulk-dow"><option value="0">日</option><option value="1">月</option><option value="2">火</option><option value="3" selected>水</option><option value="4">木</option><option value="5">金</option><option value="6">土</option></select>
        </div>
        <div class="f-group" style="flex:2"><label class="f-label">公演名</label><input class="f-input" id="bulk-name" value="定例会"></div>
      </div>
      <div class="f-row">
        <div class="f-group"><label class="f-label">時間（任意）</label><input class="f-input" id="bulk-time" type="time"></div>
        <div class="f-group" style="flex:2"><label class="f-label">会場（任意）</label><input class="f-input" id="bulk-venue"></div>
      </div>
      <button class="btn btn-sky btn-full" onclick="bulkAdd()">一括登録する</button>
    </div>
    <div class="card">
      <div class="card-head">１件登録</div>
      <div class="f-row">
        <div class="f-group"><label class="f-label">日付</label><input class="f-input" id="s-date" type="date"></div>
        <div class="f-group" style="flex:2"><label class="f-label">公演名</label><input class="f-input" id="s-name" placeholder="特別公演"></div>
      </div>
      <div class="f-row">
        <div class="f-group"><label class="f-label">時間（任意）</label><input class="f-input" id="s-time" type="time"></div>
        <div class="f-group" style="flex:2"><label class="f-label">会場（任意）</label><input class="f-input" id="s-venue"></div>
      </div>
      <button class="btn btn-outline btn-full" onclick="singleAdd()">追加する</button>
    </div>
    <div class="card">
      <div class="card-head">番組を組む条件（設定者のみ）</div>
      <div class="opt-label">出演回数</div>
      <div class="opt-grp" id="og-count"><button class="opt-btn on" data-v="equal">均等</button><button class="opt-btn" data-v="free">不問</button></div>
      <div class="opt-label">芸種バランス</div>
      <div class="opt-grp" id="og-geishu"><button class="opt-btn on" data-v="equal">均等</button><button class="opt-btn" data-v="kodan">講談多め</button><button class="opt-btn" data-v="free">不問</button></div>
      <div class="f-row">
        <div class="f-group"><label class="f-label">最小人数</label><input class="f-input" id="cfg-minP" type="number" value="3" min="1" max="10"></div>
        <div style="padding-top:22px;color:#4a6572">〜</div>
        <div class="f-group"><label class="f-label">最大人数</label><input class="f-input" id="cfg-maxP" type="number" value="5" min="1" max="10"></div>
      </div>
      <div class="opt-label">仲入り</div>
      <div class="opt-grp" id="og-nakairi"><button class="opt-btn on" data-v="middle">中間に入れる</button><button class="opt-btn" data-v="none">なし</button></div>
      <button class="btn btn-sky btn-full" onclick="saveConfig()">条件を保存</button>
    </div>
    <div class="card">
      <div class="card-head">登録済みの公演</div>
      <div id="admin-list"><div class="empty">公演がありません</div></div>
    </div>
    <div class="card" style="border-color:#f0c8c8">
      <div class="card-head" style="color:#d94f4f">データ操作</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn btn-amber btn-full" onclick="doArchive()">本日以前をアーカイブ</button>
        <button class="btn btn-danger btn-full" onclick="doReset()">全回答をリセット</button>
        <button class="btn btn-outline btn-full" onclick="syncAll()">データを再読み込み</button>
      </div>
      <div class="danger-note">※アーカイブ：公演に済フラグ。毎月1日に自動実行。<br>※リセット：全員の回答が消えます。</div>
    </div>
    <div class="card">
      <div class="card-head">GAS URL設定</div>
      <div class="f-group"><label class="f-label">ウェブアプリURL</label><input class="f-input" id="cfg-url" type="url"></div>
      <button class="btn btn-outline btn-full" onclick="saveUrlCfg()">URLを保存</button>
    </div>
  </div>

  <!-- 書き出しタブ -->
  <div id="tab-export" class="tab-pane">
    <div style="padding:12px">
      <div class="f-group"><label class="f-label">対象期間</label>
        <select class="f-select" id="exp-months" onchange="renderExp()">
          <option value="2">直近2ヶ月</option><option value="3">直近3ヶ月</option><option value="6">直近6ヶ月</option><option value="0">全期間</option>
        </select>
      </div>
      <div class="exp-preview" id="exp-preview"><div class="empty">データを読み込んでください</div></div>
      <button class="btn btn-sky btn-full" onclick="exportJpg()">📷 JPGとして保存する</button>
      <div style="font-size:.7rem;color:#4a6572;text-align:center;margin-top:8px">スマホではスクリーンショットでも保存できます</div>
    </div>
  </div>

</div>

<!-- 番組モーダル -->
<div id="plan-modal" class="modal-bg hidden">
  <div class="modal-box">
    <div class="modal-head">
      <span class="modal-title">✦ 予定を組む</span>
      <button class="btn-close" onclick="closePlan()">✕</button>
    </div>
    <div class="f-group"><label class="f-label">公演を選ぶ</label>
      <select class="f-select" id="plan-sel" onchange="loadPlan()"><option value="">選択してください</option></select>
    </div>
    <div id="plan-body"></div>
    <div id="plan-save" style="display:none;margin-top:12px">
      <button class="btn btn-sky btn-full" onclick="savePlan()">この番組を確定・保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div id="jpg-src" style="position:fixed;left:-9999px;top:0;width:720px;background:#fff"></div>

<script>
const KEY='ens_url_v2';
let GAS_URL=localStorage.getItem(KEY)||'';
let D={koens:[],replies:[],casts:[],config:{}};
let pending={};
let planCast=[];
let planKoenId='';
const DOW=['日','月','火','水','木','金','土'];

window.onload=function(){
  initYear();initMonths();initOpts();
  document.getElementById('cfg-url').value=GAS_URL;
  if(!GAS_URL){ showErr('GAS URLが未設定です。管理タブから設定してください。'); return; }
  syncAll();
};

function showErr(msg){
  document.getElementById('loading').classList.add('off');
  document.getElementById('app').style.display='block';
  document.getElementById('t-body').innerHTML='<tr><td colspan="10" style="text-align:center;padding:20px;color:#c03030">'+msg+'</td></tr>';
}

async function gas(params){
  if(!GAS_URL){toast('URLが未設定です');return null;}
  try{
    const qs=Object.entries(params).map(([k,v])=>k+'='+encodeURIComponent(typeof v==='object'?JSON.stringify(v):v)).join('&');
    const r=await fetch(GAS_URL+'?'+qs,{redirect:'follow'});
    return await r.json();
  }catch(e){toast('通信エラー: '+e.message);return null;}
}

async function syncAll(){
  showLoad(true);
  const d=await gas({action:'getAll'});
  showLoad(false);
  if(!d||!d.ok){showErr('GASとの通信に失敗しました。管理タブでURLを確認してください。');return;}
  D=d;
  applyConfig();
  autoArchive();
  renderTable();
  renderAdminList();
  renderPlanSel();
  renderExp();
  updateMyBar();
}

function autoArchive(){
  const t=today(),f=t.slice(0,7)+'-01';
  if(t===f) gas({action:'archiveBefore',before:f}).then(r=>{if(r&&r.ok)syncAll();});
}

function showTab(name,btn){
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.btab').forEach(b=>b.classList.remove('on'));
  document.getElementById('tab-'+name).classList.add('on');
  btn.classList.add('on');
  if(name==='export')renderExp();

function cycleCell(koenId,td){
  const nm=myName();
  if(!nm){toast('先にお名前を入力してください');return;}
  const cycle=[null,'ok','delta','ng'];
  const cur=pending[koenId]||(D.replies.find(r=>r.koenId===koenId&&r.name===nm)||{}).status||null;
  const next=cycle[(cycle.indexOf(cur)+1)%cycle.length];
  if(next===null)delete pending[koenId]; else pending[koenId]=next;

function updateSendBtn(){

  const cnt=Object.keys(pending).length;

async function sendAll(){
  const nm=myName();
  if(!nm||!Object.keys(pending).length)return;
  document.getElementById('btn-send').disabled=true;
  let ok=true;
  for(const[koenId,status]of Object.entries(pending)){
    const r=await gas({action:'saveReply',koenId,name:nm,status,geishu:''});
    if(!r||!r.ok){ok=false;break;}
    const idx=D.replies.findIndex(r=>r.koenId===koenId&&r.name===nm);

  renderTable();updateSendBtn();updateMyBar();

// ===== 全期間一括割り付け =====
function generateAllPlans(){
  const cfg=D.config||{};
  const minP=parseInt(cfg.minP)||3;
  const nakairi=cfg.nakairi||'middle';

  const koens=D.koens.filter(k=>!k.archived);
  if(!koens.length){toast('対象の公演がありません');return null;}

  // Step1: 各人の出演可能公演セット作成
  const avail={};
  koens.forEach(k=>{
    D.replies.filter(r=>r.koenId===k.id).forEach(r=>{
      if(!avail[r.name])avail[r.name]={ok:new Set(),delta:new Set(),geishu:r.geishu||''};
      if(r.status==='ok')   avail[r.name].ok.add(k.id);
      if(r.status==='delta')avail[r.name].delta.add(k.id);
    });
  });
  const names=Object.keys(avail);
  if(!names.length){toast('回答がありません');return null;}

  // Step2: 目標回数 = min(上限, ceil(平均))
  const totalSlots=koens.length*minP;
  const upper={};
  names.forEach(n=>{upper[n]=avail[n].ok.size+avail[n].delta.size;});
  const ceilAvg=Math.ceil(totalSlots/names.length);
  const target={};
  names.forEach(n=>{target[n]=Math.min(upper[n],ceilAvg);});

  // 各公演の残席
  const seats={};
  koens.forEach(k=>{seats[k.id]=minP;});

  // 割り当て結果 { name: [{koenId, isDelta}] }
  const assigned={};
  names.forEach(n=>{assigned[n]=[];});

  const canAttend=(n,k)=>avail[n].ok.has(k)||avail[n].delta.has(k);
  const isDelta  =(n,k)=>!avail[n].ok.has(k)&&avail[n].delta.has(k);

  // Step3: ○+△が少ない人（希少な人）から順に目標回数分を確定
  const order=[...names].sort((a,b)=>upper[a]-upper[b]);
  order.forEach(n=>{
    const tgt=target[n];
    // 出られる公演を○優先・席が少ない（争奪戦）順に並べる
    const candidates=koens
      .filter(k=>canAttend(n,k.id)&&seats[k.id]>0)
      .map(k=>({id:k.id,isDt:isDelta(n,k.id)}))
      .sort((a,b)=>a.isDt-b.isDt||seats[a.id]-seats[b.id]);
    // 目標回数分だけ確定
    candidates.slice(0,tgt).forEach(({id,isDt})=>{
      assigned[n].push({koenId:id,isDelta:isDt});
      seats[id]--;
    });
  });

  // Step4: 人数不足の公演を補充（現出演数が少ない人・○優先）
  koens.forEach(k=>{
    while(seats[k.id]>0){
      const cnt={};
      names.forEach(n=>{cnt[n]=assigned[n].length;});
      const candidates=names
        .filter(n=>canAttend(n,k.id)&&!assigned[n].find(a=>a.koenId===k.id))
        .sort((a,b)=>isDelta(a,k.id)-isDelta(b,k.id)||cnt[a]-cnt[b]);
      if(!candidates.length)break;
      const n=candidates[0];
      assigned[n].push({koenId:k.id,isDelta:isDelta(n,k.id)});
      seats[k.id]--;
    }
  });

  // Step5: 出演順（累計少ない順が前座→トリ）
  const runCount={};
  names.forEach(n=>{runCount[n]=0;});

  return koens.map(k=>{
    const cast=names
      .filter(n=>assigned[n].find(a=>a.koenId===k.id))
      .map(n=>({name:n,isDelta:!!assigned[n].find(a=>a.koenId===k.id&&a.isDelta),geishu:avail[n].geishu}));
    cast.sort((a,b)=>(runCount[a.name]||0)-(runCount[b.name]||0));
    cast.forEach(p=>{runCount[p.name]=(runCount[p.name]||0)+1;});
    const ni=Math.floor(cast.length/2);
    return {
      koen:k,
      cast:cast.map((p,i)=>({
        order:i+1,
        name:p.name,
        geishu:p.geishu,
        neta:'',
        pending:p.isDelta,
        nakairiAfter:nakairi==='middle'&&i===ni-1,
      })),
    };
  });
}

// 単公演の自動提案（モーダル内）
function autoPlan(){
  const allPlans=generateAllPlans();
  if(!allPlans)return;
  const plan=allPlans.find(p=>p.koen.id===planKoenId);
  if(!plan){document.getElementById('plan-body').innerHTML='<div class="empty">この公演の回答がありません</div>';return;}
  planCast=plan.cast;
  renderPlanBody();
}

function renderPlanBody(){
  const nakairi=(D.config||{}).nakairi||'middle';
  let html='';
  planCast.forEach((p,i)=>{
    // 仲入りは nakairiAfter フラグで判定（なければ中間）
    const doNakairi=p.nakairiAfter||(nakairi==='middle'&&i===Math.floor(planCast.length/2));
    if(doNakairi)html+='<div class="nakairi-div">〜 仲入り 〜</div>';
    const role=i===planCast.length-1?'トリ':i===0?'前座':'中堅';
    const pendingMark=p.pending?'<span style="background:#fff3cd;color:#856404;border:1px solid #ffc107;border-radius:10px;font-size:.62rem;padding:1px 6px;margin-left:4px">要確認</span>':'';
    html+='<div class="cast-row"><div class="cast-num" style="'+(p.pending?'background:#e0a800':'')+'">'+(i+1)+'</div><div><div class="cast-name">'+p.name+pendingMark+'</div><div class="cast-role">'+role+(p.geishu?' / '+p.geishu:'')+'</div></div><input class="neta" placeholder="演目" value="'+(p.neta||'')+'" onchange="planCast['+i+'].neta=this.value"></div>';
  });
  document.getElementById('plan-body').innerHTML=html?'<div style="border:1px solid #d0e8f0;border-radius:8px;padding:10px;background:#fff;margin-bottom:8px">'+html+'</div>':'<div class="empty">出演候補がありません</div>';
}

async function savePlan(){
  if(!planKoenId||!planCast.length){toast('番組が空です');return;}
  const cast=planCast.map((p,i)=>({order:i+1,name:p.name,geishu:p.geishu,neta:p.neta||'',pending:p.pending||false}));
  const r=await gas({action:'saveCast',koenId:planKoenId,cast:JSON.stringify(cast)});
  if(r&&r.ok){
    D.casts=D.casts.filter(c=>c.koenId!==planKoenId);
    cast.forEach((c,i)=>D.casts.push({id:'_'+i,koenId:planKoenId,...c}));
    toast('番組を保存しました');closePlan();renderExp();
  }
}

async function generateAndSaveAll(){
  const plans=generateAllPlans();
  if(!plans)return;
  toast('計算中…');
  const payload=plans.map(p=>({
    koenId:p.koen.id,
    cast:p.cast.map((c,i)=>({order:i+1,name:c.name,geishu:c.geishu,neta:c.neta||'',pending:c.pending||false}))
  }));
  const r=await gas({action:'saveBulkCast',plans:JSON.stringify(payload)});
  if(r&&r.ok){
    // ローカルのD.castsを更新
    D.casts=[];
    payload.forEach(plan=>{
      plan.cast.forEach((c,i)=>D.casts.push({id:'_'+plan.koenId+'_'+i,koenId:plan.koenId,...c}));
    });
    toast('全公演の予定を組みました ✓');
    closePlan();
    renderExp();
    // 結果サマリーを表示
    showPlanSummary(plans);
  }
}

function renderExp(){
  const months=parseInt(document.getElementById('exp-months').value)||2;
  const cutoff=months>0?monthsAgo(months):'0000-00-00';
  const targets=D.koens.filter(k=>!k.archived&&k.date>=cutoff);
  const el=document.getElementById('exp-preview');
  if(!targets.length){el.innerHTML='<div class="empty">対象の公演がありません</div>';return;}
  const t=today().split('-');
  const period=months>0?t[0]+'年'+parseInt(t[1])+'月〜'+(parseInt(t[1])+months-1)+'月':'全期間';
  // 上：日程一覧（チラシ風）
  let html='<div class="exp-title">出演予定一覧　'+period+'</div>';
  const byMonth={},monthOrder=[];
  targets.forEach(k=>{
    const d=pd(k.date);
    const mk=(d.getMonth()+1)+'月';
    if(!byMonth[mk]){byMonth[mk]=[];monthOrder.push(mk);}
    byMonth[mk].push(k);
  });
  monthOrder.forEach(mk=>{
    html+='<div style="font-size:.9rem;font-weight:700;color:#1e8fb5;padding:8px 0 3px;border-bottom:1px solid #b3dff0;margin-bottom:2px">'+mk+'</div>';
    byMonth[mk].forEach(k=>{
      const d=pd(k.date);
      const lbl=d.getDate()+'日（'+DOW[d.getDay()]+'）';
      const cast=D.casts.filter(c=>c.koenId===k.id).sort((a,b)=>a.order-b.order);
      const people=cast.length
        ? cast.map(c=>c.pending?'<span style="color:#856404">'+c.name+'⚠</span>':c.name)
        : D.replies.filter(r=>r.koenId===k.id&&r.status==='ok').map(r=>r.name);
      html+='<div style="display:flex;gap:10px;padding:5px 0;border-bottom:1px solid #f5f5f5;font-size:.85rem">'
        +'<div style="min-width:76px;font-weight:700;color:#1a2e38">'+lbl+'</div>'
        +'<div>'+( people.join('　')||'<span style="color:#aaa">未定</span>')+'</div>'
        +'</div>';
    });
  });

  // 下：人別・出演日まとめ
  const personDates={};
  targets.forEach(k=>{
    const d=pd(k.date);
    const dlbl=(d.getMonth()+1)+'/'+d.getDate();
    const cast=D.casts.filter(c=>c.koenId===k.id).sort((a,b)=>a.order-b.order);
    const people=cast.length
      ? cast.map(c=>({name:c.name,pending:c.pending,lbl:dlbl}))
      : D.replies.filter(r=>r.koenId===k.id&&r.status==='ok').map(r=>({name:r.name,pending:false,lbl:dlbl}));
    people.forEach(p=>{
      if(!personDates[p.name])personDates[p.name]=[];
      personDates[p.name].push({lbl:p.lbl,pending:p.pending});
    });
  });

  if(Object.keys(personDates).length){
    html+='<div style="margin-top:14px;padding-top:10px;border-top:2px solid #b3dff0">';
    html+='<div style="font-size:.82rem;font-weight:700;color:#1e8fb5;margin-bottom:8px">出演日まとめ</div>';
    Object.entries(personDates)
      .sort((a,b)=>b[1].length-a[1].length)
      .forEach(([name,dates])=>{
        const dateStr=dates.map(d=>d.pending
          ?'<span style="color:#856404">'+d.lbl+'⚠</span>'
          :d.lbl
        ).join('・');
        html+='<div style="display:flex;align-items:baseline;gap:6px;padding:5px 0;border-bottom:1px solid #f5f5f5;font-size:.82rem">'
          +'<div style="min-width:70px;font-weight:700">'+name+'</div>'
          +'<div style="flex:1;color:#1a2e38">'+dateStr+'</div>'
          +'<div style="color:#1e8fb5;font-weight:700;white-space:nowrap">（'+dates.length+'回）</div>'
          +'</div>';
      });
    html+='</div>';
  }

  el.innerHTML=html;
}

async function exportJpg(){
  const months=parseInt(document.getElementById('exp-months').value)||2;
  const cutoff=months>0?monthsAgo(months):'0000-00-00';
  const targets=D.koens.filter(k=>!k.archived&&k.date>=cutoff);
  const t=today().split('-');
  const period=months>0?t[0]+'年'+parseInt(t[1])+'月〜'+(parseInt(t[1])+months-1)+'月':'全期間';
  const src=document.getElementById('jpg-src');
  src.innerHTML='<div style="padding:24px"><div style="text-align:center;font-size:1.1rem;font-weight:700;color:#1e8fb5;padding-bottom:12px;border-bottom:2px solid #b3dff0;margin-bottom:14px">出演予定一覧　'+period+'</div>'+targets.map(k=>{
    const d=pd(k.date);
    const lbl=(d.getMonth()+1)+'月'+d.getDate()+'日（'+DOW[d.getDay()]+'）';
    const cast=D.casts.filter(c=>c.koenId===k.id).sort((a,b)=>a.order-b.order);
    const chips=(cast.length?cast:D.replies.filter(r=>r.koenId===k.id&&r.status==='ok').map(r=>({name:r.name}))).map(c=>'<span style="background:#e4f4fb;color:#1e6f8f;border:1px solid #b3dff0;padding:2px 9px;border-radius:10px;font-size:.75rem">'+c.name+'</span>').join(' ');
    return '<div style="display:flex;gap:12px;align-items:flex-start;padding:8px 0;border-bottom:1px solid #f0f8fc"><div style="min-width:110px;font-weight:700;font-size:.88rem;color:#1e8fb5;flex-shrink:0">'+lbl+'<br><span style="font-size:.72rem;color:#4a6572;font-weight:400">'+k.name+(k.time?' '+k.time:'')+'</span></div><div style="display:flex;flex-wrap:wrap;gap:4px">'+(chips||'<span style="color:#aaa;font-size:.75rem">未定</span>')+'</div></div>';
  }).join('')+'</div>';
  src.style.cssText='position:fixed;left:0;top:0;z-index:9999;background:#fff;width:100%;overflow:auto;max-height:100vh';
  toast('スクリーンショットで保存してください。タップで閉じます。');
  src.onclick=()=>{src.style.cssText='position:fixed;left:-9999px;top:0;width:720px;background:#fff';};
}

function applyConfig(){
  const cfg=D.config||{};
  setOpt('og-count',cfg.countMode||'equal');
  setOpt('og-geishu',cfg.geishuMode||'equal');
  setOpt('og-nakairi',cfg.nakairi||'middle');
  if(cfg.minP)document.getElementById('cfg-minP').value=cfg.minP;
  if(cfg.maxP)document.getElementById('cfg-maxP').value=cfg.maxP;
}
function setOpt(id,val){document.querySelectorAll('#'+id+' .opt-btn').forEach(b=>b.classList.toggle('on',b.dataset.v===val));}
function initOpts(){document.querySelectorAll('.opt-grp').forEach(g=>{g.addEventListener('click',function(e){const b=e.target.closest('.opt-btn');if(!b)return;g.querySelectorAll('.opt-btn').forEach(x=>x.classList.remove('on'));b.classList.add('on');});});}
function getOpt(id){const b=document.querySelector('#'+id+' .opt-btn.on');return b?b.dataset.v:null;}
function showLoad(b){const l=document.getElementById('loading');if(b){l.classList.remove('off');l.style.display='flex';}else{l.classList.add('off');setTimeout(()=>l.style.display='none',300);}if(!b)document.getElementById('app').style.display='block';}
function today(){const d=new Date();return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());}
function p2(n){return String(n).padStart(2,'0');}
function monthsAgo(n){const d=new Date();d.setMonth(d.getMonth()-n+1);d.setDate(1);return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-01';}
function pd(s){const p=s.split('-').map(Number);return new Date(p[0],p[1]-1,p[2]);}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2400);}
function initYear(){const s=document.getElementById('bulk-year'),y=new Date().getFullYear();for(let i=y;i<=y+2;i++){const o=document.createElement('option');o.value=i;o.textContent=i+'年';if(i===y)o.selected=true;s.appendChild(o);}}
function initMonths(){const n=new Date().getMonth()+1;document.querySelectorAll('#bulk-months input').forEach(c=>{const v=parseInt(c.value);if(v===n||v===(n%12)+1)c.checked=true;});}
</script>
